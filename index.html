<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1a1b26">
  <title>달력 할일</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #1a1b26;
      --surface: #24283b;
      --surface2: #414868;
      --text: #c0caf5;
      --text-dim: #565f89;
      --accent: #7aa2f7;
      --accent-soft: rgba(122, 162, 247, 0.2);
      --green: #9ece6a;
      --red: #f7768e;
      --yellow: #e0af68;
      --safe-top: env(safe-area-inset-top, 0);
      --safe-bottom: env(safe-area-inset-bottom, 0);
      --touch: 44px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { -webkit-tap-highlight-color: transparent; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      min-height: 100dvh;
      padding-top: var(--safe-top);
      padding-bottom: var(--safe-bottom);
    }

    /* 헤더 */
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--bg);
      padding: 12px 16px 16px;
      border-bottom: 1px solid var(--surface2);
    }
    .header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    h1 {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text);
    }
    .nav-month {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .nav-btn {
      width: var(--touch);
      height: var(--touch);
      border: none;
      border-radius: 12px;
      background: var(--surface);
      color: var(--text);
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }
    .nav-btn:active { background: var(--surface2); }
    .current-month {
      font-size: 1rem;
      font-weight: 600;
      min-width: 120px;
      text-align: center;
    }

    /* 달력 */
    .calendar-wrap {
      padding: 12px 12px 16px;
    }
    .weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      text-align: center;
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--text-dim);
      margin-bottom: 8px;
    }
    .weekdays span { padding: 4px 0; }
    .weekdays span:first-child { color: var(--red); }
    .weekdays span:last-child { color: var(--accent); }
    .days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }
    .day-cell {
      aspect-ratio: 1;
      max-width: 52px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      position: relative;
      overflow: visible;
    }
    .day-cell.other-month { color: var(--text-dim); opacity: 0.6; }
    .day-cell.today {
      background: var(--accent-soft);
      color: var(--accent);
      font-weight: 700;
    }
    .day-cell.sunday:not(.selected) { color: var(--red); }
    .day-cell.holiday:not(.selected) { color: var(--red); font-weight: 700; }
    .day-cell.other-month.sunday:not(.selected),
    .day-cell.other-month.holiday:not(.selected) { color: rgba(247, 118, 142, 0.75); }
    .day-cell.selected {
      background: var(--accent);
      color: var(--bg);
    }
    .day-cell:active { opacity: 0.8; }
    .day-cell .dot {
      position: absolute;
      bottom: 2px;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--green);
    }
    .day-cell.selected .dot { background: var(--bg); }

    /* 선택한 날짜 + 할일 목록 */
    .day-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      background: var(--surface);
      border-radius: 20px 20px 0 0;
      margin: 0 12px;
      padding: 20px 16px calc(16px + var(--safe-bottom));
      box-shadow: 0 -4px 24px rgba(0,0,0,0.3);
    }
    .day-panel h2 {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-dim);
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--surface2);
    }
    .day-panel .date-str { color: var(--accent); font-weight: 700; }
    .task-list {
      list-style: none;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      flex: 1;
      min-height: 80px;
    }
    .task-list:empty::after {
      content: '이 날에 할 일을 추가해 보세요.';
      display: block;
      color: var(--text-dim);
      font-size: 0.9rem;
      text-align: center;
      padding: 24px 16px;
    }
    .task-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: var(--bg);
      border-radius: 12px;
      margin-bottom: 8px;
      font-size: 0.95rem;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
    .task-item.done .task-text {
      text-decoration: line-through;
      color: var(--text-dim);
    }
    .task-check {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid var(--surface2);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.15s;
    }
    .task-item.done .task-check {
      background: var(--green);
      border-color: var(--green);
      color: var(--bg);
    }
    .task-item.done .task-check::after { content: '✓'; font-size: 12px; font-weight: 700; }
    .task-text { flex: 1; word-break: break-word; }
    .task-delete {
      width: 36px;
      height: 36px;
      border: none;
      border-radius: 8px;
      background: transparent;
      color: var(--text-dim);
      font-size: 1.1rem;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .task-delete:active { background: rgba(247,118,142,0.2); color: var(--red); }

    /* 할일 추가 */
    .add-form {
      display: flex;
      gap: 10px;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--surface2);
    }
    .add-form input {
      flex: 1;
      min-width: 0;
      height: var(--touch);
      padding: 0 16px;
      border: 1px solid var(--surface2);
      border-radius: 12px;
      background: var(--bg);
      color: var(--text);
      font-size: 1rem;
      font-family: inherit;
    }
    .add-form input::placeholder { color: var(--text-dim); }
    .add-form input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-soft);
    }
    .add-form button {
      height: var(--touch);
      padding: 0 20px;
      border: none;
      border-radius: 12px;
      background: var(--accent);
      color: var(--bg);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      flex-shrink: 0;
    }
    .add-form button:active { opacity: 0.9; }

    .no-date-hint {
      text-align: center;
      color: var(--text-dim);
      font-size: 0.9rem;
      padding: 32px 24px;
    }
  </style>
</head>
<body>
  <header>
    <div class="header-row">
      <h1>📅 달력 할일</h1>
      <div class="nav-month">
        <button type="button" class="nav-btn" id="prevMonth" aria-label="이전 달">‹</button>
        <span class="current-month" id="currentMonth"></span>
        <button type="button" class="nav-btn" id="nextMonth" aria-label="다음 달">›</button>
      </div>
    </div>
  </header>

  <div class="calendar-wrap">
    <div class="weekdays">
      <span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span>
    </div>
    <div class="days" id="days"></div>
  </div>

  <div class="day-panel" id="dayPanel">
    <p class="no-date-hint" id="noDateHint">날짜를 눌러 할 일을 추가하세요.</p>
    <div id="dayContent" style="display: none;">
      <h2>할 일 · <span class="date-str" id="selectedDateStr"></span></h2>
      <ul class="task-list" id="taskList"></ul>
      <form class="add-form" id="addForm">
        <input type="text" id="taskInput" placeholder="할 일 입력" maxlength="200" autocomplete="off">
        <button type="submit">추가</button>
      </form>
    </div>
  </div>

  <script>
    (function() {
      const STORAGE_KEY = 'calendar-tasks';
      const SEOUL_TZ = 'Asia/Seoul';
      const holidayCache = Object.create(null); // { [year:number]: { set: Set<string>, names: Record<string,string> } }
      const weekdayShortFormatter = new Intl.DateTimeFormat('en-US', { timeZone: SEOUL_TZ, weekday: 'short' });
      const koreanCalFormatter = new Intl.DateTimeFormat('ko-KR-u-ca-korean', { timeZone: SEOUL_TZ, year: 'numeric', month: 'numeric', day: 'numeric' });
      let state = {
        year: new Date().getFullYear(),
        month: new Date().getMonth(),
        selected: null,
        tasks: loadTasks()
      };

      function loadTasks() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          return raw ? JSON.parse(raw) : {};
        } catch (e) { return {}; }
      }
      function saveTasks() {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(state.tasks));
        } catch (e) {}
      }

      function dateKey(y, m, d) {
        m = m + 1;
        return y + '-' + (m < 10 ? '0' + m : m) + '-' + (d < 10 ? '0' + d : d);
      }
      function parseDateKey(key) {
        const y = parseInt(key.slice(0, 4), 10);
        const m = parseInt(key.slice(5, 7), 10) - 1;
        const d = parseInt(key.slice(8, 10), 10);
        return { y, m, d };
      }
      function dateKeyAddDays(key, deltaDays) {
        const p = parseDateKey(key);
        const dt = new Date(Date.UTC(p.y, p.m, p.d, 12, 0, 0));
        dt.setUTCDate(dt.getUTCDate() + deltaDays);
        return dateKey(dt.getUTCFullYear(), dt.getUTCMonth(), dt.getUTCDate());
      }
      function seoulWeekdayIndexFromKey(key) {
        const p = parseDateKey(key);
        const dt = new Date(Date.UTC(p.y, p.m, p.d, 12, 0, 0));
        const wd = weekdayShortFormatter.format(dt);
        switch (wd) {
          case 'Sun': return 0;
          case 'Mon': return 1;
          case 'Tue': return 2;
          case 'Wed': return 3;
          case 'Thu': return 4;
          case 'Fri': return 5;
          case 'Sat': return 6;
          default: return dt.getUTCDay();
        }
      }
      function isWeekendInSeoul(key) {
        const wd = seoulWeekdayIndexFromKey(key);
        return wd === 0 || wd === 6;
      }
      function koreanLunarMonthDayFromKey(key) {
        const p = parseDateKey(key);
        const dt = new Date(Date.UTC(p.y, p.m, p.d, 12, 0, 0));
        const parts = koreanCalFormatter.formatToParts(dt);
        const monthPart = parts.find(function(x) { return x.type === 'month'; });
        const dayPart = parts.find(function(x) { return x.type === 'day'; });
        const monthRaw = monthPart ? monthPart.value : '';
        const dayRaw = dayPart ? dayPart.value : '';
        const month = parseInt(monthRaw.replace(/\D/g, ''), 10);
        const day = parseInt(dayRaw.replace(/\D/g, ''), 10);
        const isLeapMonth = /윤/.test(monthRaw) || /leap/i.test(monthRaw);
        return { month: month, day: day, isLeapMonth: isLeapMonth };
      }
      function nextWeekdayNotHoliday(set, startKey) {
        let k = startKey;
        while (true) {
          k = dateKeyAddDays(k, 1);
          const wd = seoulWeekdayIndexFromKey(k);
          const isWeekday = wd >= 1 && wd <= 5;
          if (isWeekday && !set.has(k)) return k;
        }
      }
      function addSubstituteIfWeekend(info, key, baseName) {
        if (!info.set.has(key)) return;
        if (!isWeekendInSeoul(key)) return;
        const subKey = nextWeekdayNotHoliday(info.set, key);
        const base = baseName || info.names[key] || '';
        info.set.add(subKey);
        info.names[subKey] = base ? (base + ' 대체공휴일') : '대체공휴일';
      }
      function addSubstituteAfterRangeIfWeekend(info, keysInOrder, baseName) {
        const anyWeekend = keysInOrder.some(function(k) { return isWeekendInSeoul(k); });
        if (!anyWeekend) return;
        const last = keysInOrder[keysInOrder.length - 1];
        const subKey = nextWeekdayNotHoliday(info.set, last);
        const base = baseName || (info.names[keysInOrder[0]] || '');
        info.set.add(subKey);
        info.names[subKey] = base ? (base + ' 대체공휴일') : '대체공휴일';
      }
      const BUDDHA_SOLAR = {
        2021: '2021-05-19',
        2022: '2022-05-08',
        2023: '2023-05-27',
        2024: '2024-05-15',
        2025: '2025-05-05',
        2026: '2026-05-24',
        2027: '2027-05-13',
        2028: '2028-05-05'
      };

      function getHolidaySetForYear(year) {
        if (holidayCache[year]) return holidayCache[year];
        const info = { set: new Set(), names: Object.create(null) };
        function addHoliday(key, name) {
          info.set.add(key);
          if (name) info.names[key] = name;
        }

        // 양력 고정 공휴일(법정공휴일)
        addHoliday(year + '-01-01', '신정');
        addHoliday(year + '-03-01', '삼일절');
        addHoliday(year + '-05-05', '어린이날');
        addHoliday(year + '-06-06', '현충일');
        addHoliday(year + '-08-15', '광복절');
        addHoliday(year + '-10-03', '개천절');
        addHoliday(year + '-10-09', '한글날');
        addHoliday(year + '-12-25', '성탄절');

        // 음력 기반 공휴일(설/추석) + 부처님오신날(음력 4/8 → 사전 계산된 양력 사용)
        let seollalKey = null;
        let chuseokKey = null;
        let buddhaKey = BUDDHA_SOLAR[year] || null;
        const start = new Date(Date.UTC(year, 0, 1, 12, 0, 0));
        const end = new Date(Date.UTC(year, 11, 31, 12, 0, 0));
        for (let dt = new Date(start); dt <= end; dt.setUTCDate(dt.getUTCDate() + 1)) {
          const key = dateKey(dt.getUTCFullYear(), dt.getUTCMonth(), dt.getUTCDate());
          const lunar = koreanLunarMonthDayFromKey(key);
          if (!lunar.isLeapMonth && lunar.month === 1 && lunar.day === 1) seollalKey = key;
          if (!lunar.isLeapMonth && lunar.month === 8 && lunar.day === 15) chuseokKey = key;
        }

        if (seollalKey) {
          const eve = dateKeyAddDays(seollalKey, -1);
          const next = dateKeyAddDays(seollalKey, 1);
          addHoliday(eve, '설 연휴');
          addHoliday(seollalKey, '설날');
          addHoliday(next, '설 연휴');
          addSubstituteAfterRangeIfWeekend(info, [eve, seollalKey, next], '설날');
        }
        if (chuseokKey) {
          const eve = dateKeyAddDays(chuseokKey, -1);
          const next = dateKeyAddDays(chuseokKey, 1);
          addHoliday(eve, '추석 연휴');
          addHoliday(chuseokKey, '추석');
          addHoliday(next, '추석 연휴');
          addSubstituteAfterRangeIfWeekend(info, [eve, chuseokKey, next], '추석');
        }
        if (buddhaKey) {
          addHoliday(buddhaKey, '부처님오신날');
          addSubstituteIfWeekend(info, buddhaKey, '부처님오신날');
        }

        // 대체공휴일(간단 규칙): 토/일이면 다음 평일 (신정/현충일 등은 제외)
        addSubstituteIfWeekend(info, year + '-03-01', '삼일절');
        addSubstituteIfWeekend(info, year + '-08-15', '광복절');
        addSubstituteIfWeekend(info, year + '-10-03', '개천절');
        addSubstituteIfWeekend(info, year + '-10-09', '한글날');
        addSubstituteIfWeekend(info, year + '-12-25', '성탄절');

        // 어린이날: 주말이거나 다른 공휴일과 겹치면 다음 평일
        const childrenKey = year + '-05-05';
        if (!info.set.has(childrenKey)) addHoliday(childrenKey, '어린이날');
        const isOverlapWithOtherHoliday =
          info.set.has(childrenKey) && info.names[childrenKey] !== '어린이날';
        if (isWeekendInSeoul(childrenKey) || isOverlapWithOtherHoliday) {
          const subKey = nextWeekdayNotHoliday(info.set, childrenKey);
          addHoliday(subKey, '어린이날 대체공휴일');
        }

        holidayCache[year] = info;
        return info;
      }
      function isHolidayKey(key) {
        const y = parseInt(key.slice(0, 4), 10);
        const info = getHolidaySetForYear(y);
        return info.set.has(key);
      }
      function getHolidayName(key) {
        const y = parseInt(key.slice(0, 4), 10);
        const info = getHolidaySetForYear(y);
        return info.names[key] || '';
      }
      function getTasksFor(key) {
        if (!state.tasks[key]) state.tasks[key] = [];
        return state.tasks[key];
      }

      function renderMonth() {
        document.getElementById('currentMonth').textContent =
          state.year + '년 ' + (state.month + 1) + '월';
        const first = new Date(state.year, state.month, 1);
        const last = new Date(state.year, state.month + 1, 0);
        const startPad = first.getDay();
        const totalDays = last.getDate();
        const prevLast = new Date(state.year, state.month, 0).getDate();
        const today = new Date();
        const todayKey = dateKey(today.getFullYear(), today.getMonth(), today.getDate());

        let html = '';
        for (let i = 0; i < startPad; i++) {
          const d = prevLast - startPad + i + 1;
          const key = state.month === 0
            ? dateKey(state.year - 1, 11, d)
            : dateKey(state.year, state.month - 1, d);
          const hasTask = (state.tasks[key] || []).some(function(t) { return !t.done; });
          const isSunday = seoulWeekdayIndexFromKey(key) === 0;
          const isHoliday = isHolidayKey(key);
          html += '<div class="day-cell other-month' + (isSunday ? ' sunday' : '') + (isHoliday ? ' holiday' : '') + '" data-date="' + key + '">' +
            d +
            (hasTask ? '<span class="dot"></span>' : '') +
            '</div>';
        }
        for (let d = 1; d <= totalDays; d++) {
          const key = dateKey(state.year, state.month, d);
          const hasTask = (state.tasks[key] || []).some(function(t) { return !t.done; });
          const isToday = key === todayKey;
          const isSelected = state.selected === key;
          const isSunday = seoulWeekdayIndexFromKey(key) === 0;
          const isHoliday = isHolidayKey(key);
          html += '<div class="day-cell' + (isToday ? ' today' : '') + (isSelected ? ' selected' : '') + (isSunday ? ' sunday' : '') + (isHoliday ? ' holiday' : '') + '" data-date="' + key + '">' +
            d +
            (hasTask ? '<span class="dot"></span>' : '') +
            '</div>';
        }
        const rest = 42 - (startPad + totalDays);
        for (let i = 0; i < rest; i++) {
          const d = i + 1;
          const key = state.month === 11
            ? dateKey(state.year + 1, 0, d)
            : dateKey(state.year, state.month + 1, d);
          const hasTask = (state.tasks[key] || []).some(function(t) { return !t.done; });
          const isSunday = seoulWeekdayIndexFromKey(key) === 0;
          const isHoliday = isHolidayKey(key);
          html += '<div class="day-cell other-month' + (isSunday ? ' sunday' : '') + (isHoliday ? ' holiday' : '') + '" data-date="' + key + '">' +
            d +
            (hasTask ? '<span class="dot"></span>' : '') +
            '</div>';
        }
        document.getElementById('days').innerHTML = html;

        document.getElementById('days').querySelectorAll('.day-cell').forEach(function(el) {
          el.addEventListener('click', function() {
            state.selected = el.dataset.date;
            saveTasks();
            renderMonth();
            renderDayPanel();
          });
        });
      }

      function renderDayPanel() {
        const hint = document.getElementById('noDateHint');
        const content = document.getElementById('dayContent');
        const list = document.getElementById('taskList');
        const input = document.getElementById('taskInput');
        const form = document.getElementById('addForm');

        if (!state.selected) {
          hint.style.display = 'block';
          content.style.display = 'none';
          return;
        }
        hint.style.display = 'none';
        content.style.display = 'block';
        const holidayNameForSelected = getHolidayName(state.selected);
        document.getElementById('selectedDateStr').textContent =
          state.selected + (holidayNameForSelected ? ' · ' + holidayNameForSelected : '');

        const tasks = getTasksFor(state.selected);
        list.innerHTML = tasks.map(function(t, i) {
          return '<li class="task-item' + (t.done ? ' done' : '') + '" data-i="' + i + '">' +
            '<span class="task-check" role="button" tabindex="0" aria-label="완료 토글"></span>' +
            '<span class="task-text">' + escapeHtml(t.text) + '</span>' +
            '<button type="button" class="task-delete" aria-label="삭제">×</button></li>';
        }).join('');

        list.querySelectorAll('.task-item').forEach(function(item) {
          const i = parseInt(item.dataset.i, 10);
          item.querySelector('.task-check').addEventListener('click', function() {
            state.tasks[state.selected][i].done = !state.tasks[state.selected][i].done;
            saveTasks();
            renderMonth();
            renderDayPanel();
          });
          item.querySelector('.task-delete').addEventListener('click', function() {
            state.tasks[state.selected].splice(i, 1);
            saveTasks();
            renderMonth();
            renderDayPanel();
          });
        });

        form.onsubmit = function(e) {
          e.preventDefault();
          const text = (input.value || '').trim();
          if (!text) return;
          getTasksFor(state.selected).push({ text: text, done: false });
          saveTasks();
          input.value = '';
          renderMonth();
          renderDayPanel();
          input.focus();
        };
      }

      function escapeHtml(s) {
        const div = document.createElement('div');
        div.textContent = s;
        return div.innerHTML;
      }

      document.getElementById('prevMonth').addEventListener('click', function() {
        if (state.month === 0) { state.year--; state.month = 11; }
        else state.month--;
        renderMonth();
      });
      document.getElementById('nextMonth').addEventListener('click', function() {
        if (state.month === 11) { state.year++; state.month = 0; }
        else state.month++;
        renderMonth();
      });

      var today = new Date();
      state.selected = dateKey(today.getFullYear(), today.getMonth(), today.getDate());
      renderMonth();
      renderDayPanel();
    })();
  </script>
</body>
</html>
