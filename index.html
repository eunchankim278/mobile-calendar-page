
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나만의 캘린더</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .calendar-container {
            background-color: #ffffff;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            width: 95%;
            max-width: 700px; /* Slightly wider for larger screens, still responsive */
            padding: 30px;
            box-sizing: border-box;
            text-align: center;
        }
        h1 {
            color: #007bff; /* Blue heading */
            margin-bottom: 20px;
            font-size: 2.2em;
        }
        .month-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 10px 0;
            border-bottom: 2px solid #e0e0e0;
        }
        .month-header button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1.1em;
            transition: background-color 0.2s ease;
        }
        .month-header button:hover {
            background-color: #0056b3;
        }
        .month-header h2 {
            margin: 0;
            font-size: 1.8em;
            color: #333;
        }
        .days-of-week {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            margin-bottom: 15px;
            font-weight: bold;
            color: #555;
        }
        .days-of-week div {
            padding: 10px 0;
            text-align: center;
        }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px; /* Space between days */
        }
        .calendar-grid div {
            background-color: #f9f9f9;
            border: 1px solid #ddd;
            padding: 8px; /* Reduced padding slightly for denser feel */
            border-radius: 5px;
            text-align: center; /* Center align text within the cell */
            font-size: 1.1em;
            min-height: 50px; /* Ensure consistent height */
            display: flex;
            justify-content: center; /* Center content horizontally */
            align-items: center; /* Center content vertically */
            transition: background-color 0.2s ease;
        }
        .calendar-grid div:hover {
            background-color: #e9ecef;
            cursor: pointer;
        }
        .empty-day {
            background-color: #ffffff;
            border: none; /* No border for empty cells */
        }
        .days-of-week div { /* Re-apply text-align:center for headers */
            text-align: center;
        }

        /* Style for Sundays (Red) */
        .calendar-grid div:nth-child(7n + 2):not(.empty-day):not(.spacer) { /* Sundays */
            color: red;
            font-weight: bold;
        }
        /* Style for Saturdays (Blue) */
        .calendar-grid div:nth-child(7n + 8):not(.empty-day):not(.spacer) { /* Saturdays */
            color: blue;
            font-weight: bold;
        }
        /* Style for specific holiday */
        .holiday {
            color: red;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="calendar-container">
        <h1>나만의 캘린더</h1>
        <div class="month-header">
            <button id="prevMonthBtn">&#10094;</button> <!-- Previous month arrow -->
            <h2 id="monthYearDisplay"></h2> <!-- Month and Year will be updated by JS -->
            <button id="nextMonthBtn">&#10095;</button> <!-- Next month arrow -->
        </div>
        <div class="days-of-week">
            <div>일</div>
            <div>월</div>
            <div>화</div>
            <div>수</div>
            <div>목</div>
            <div>금</div>
            <div>토</div>
        </div>
        <div class="calendar-grid">
            <!-- Static representation of March 2026 calendar (starts on Sunday) -->
            <!-- March 1st, 2026 is a Sunday -->
            <!-- Days 1-31. March 31st is a Tuesday. Needs 4 empty cells at the end. -->
            <div class="spacer" style="grid-column: start;"></div> <!-- Spacer for alignment -->
            <div>1</div>
            <div class="holiday">2</div> <!-- March 2nd -->
            <div>3</div>
            <div>4</div>
            <div>5</div>
            <div>6</div>
            <div>7</div>

            <div>8</div>
            <div>9</div>
            <div>10</div>
            <div>11</div>
            <div>12</div>
            <div>13</div>
            <div>14</div>

            <div>15</div>
            <div>16</div>
            <div>17</div>
            <div>18</div>
            <div>19</div>
            <div>20</div>
            <div>21</div>

            <div>22</div>
            <div>23</div>
            <div>24</div>
            <div>25</div>
            <div>26</div>
            <div>27</div>
            <div>28</div>

            <div>29</div>
            <div>30</div>
            <div>31</div>
            <div class="empty-day"></div>
            <div class="empty-day"></div>
            <div class="empty-day"></div>
            <div class="empty-day"></div>
        </div>
    </div>

    <script>
        let currentYear = 2026;
        let currentMonth = 3; // March (1-indexed)
        const monthNames = ["", "1월", "2월", "3월", "4월", "5월", "6월", "7월", "8월", "9월", "10월", "11월", "12월"];

        function renderCalendar() {
            const calendarGrid = document.getElementById('calendar-grid');
            const monthYearDisplay = document.getElementById('monthYearDisplay');
            
            // Clear previous calendar days
            calendarGrid.innerHTML = '';

            // Update month and year display
            monthYearDisplay.textContent = `${monthNames[currentMonth]} ${currentYear}`;

            // Calculate the first day of the week for the current month
            const firstDayOfMonth = new Date(currentYear, currentMonth - 1, 1);
            const startingDayOfWeek = firstDayOfMonth.getDay(); // 0 is Sunday

            // Get the number of days in the current month
            const daysInMonth = new Date(currentYear, currentMonth, 0).getDate();

            // Add empty days to fill the grid before the first day of the month
            for (let i = 0; i < startingDayOfWeek; i++) {
                const emptyDayDiv = document.createElement('div');
                emptyDayDiv.classList.add('empty-day');
                calendarGrid.appendChild(emptyDayDiv);
            }

            // Add the days of the month
            for (let day = 1; day <= daysInMonth; day++) {
                const dayDiv = document.createElement('div');
                dayDiv.textContent = day;
                
                const currentDate = new Date(currentYear, currentMonth - 1, day);
                const dayOfWeek = currentDate.getDay(); // 0 for Sunday, 6 for Saturday

                // Apply styles based on day of the week
                if (dayOfWeek === 0) { // Sunday
                    dayDiv.style.color = 'red';
                    dayDiv.style.fontWeight = 'bold';
                } else if (dayOfWeek === 6) { // Saturday
                    dayDiv.style.color = 'blue';
                    dayDiv.style.fontWeight = 'bold';
                }
                
                // Highlight the holiday (March 2nd)
                if (currentYear === 2026 && currentMonth === 3 && day === 2) {
                    dayDiv.classList.add('holiday');
                }

                calendarGrid.appendChild(dayDiv);
            }

            // Add empty days at the end to fill the grid (up to 7 columns)
            const totalCellsFilled = startingDayOfWeek + daysInMonth;
            const remainingCells = (7 - (totalCellsFilled % 7)) % 7;
            
            for (let i = 0; i < remainingCells; i++) {
                const emptyDayDiv = document.createElement('div');
                emptyDayDiv.classList.add('empty-day');
                calendarGrid.appendChild(emptyDayDiv);
            }
        }

        // Navigation functions
        function changeMonth(offset) {
            let newMonth = currentMonth + offset;
            let newYear = currentYear;

            if (newMonth < 1) { // If month goes below 1 (January)
                newMonth = 12; // Reset to December
                newYear--;     // Decrement year
            } else if (newMonth > 12) { // If month goes above 12 (December)
                newMonth = 1;  // Reset to January
                newYear++;     // Increment year
            }
            currentMonth = newMonth;
            currentYear = newYear;
            renderCalendar();
        }

        function prevMonth() {
            changeMonth(-1);
        }

        function nextMonth() {
            changeMonth(1);
        }

        // Attach event listeners to buttons
        document.getElementById('prevMonthBtn').addEventListener('click', prevMonth);
        document.getElementById('nextMonthBtn').addEventListener('click', nextMonth);

        // Initial rendering of the calendar on page load
        window.onload = renderCalendar;
    </script>
</body>
</html>
